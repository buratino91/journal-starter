# otel-config.yaml
receivers:
  otlp:
    protocols:
      grpc:
        endpoint: 0.0.0.0:4317
      http:
        endpoint: 0.0.0.0:4318

processors:
  batch:
  resourcedetection:
    detectors: [env, system]   # add "eks" if running in EKS
    timeout: 5s

exporters:
  awsxray:
    region: us-east-1
  awsemf:
    region: us-east-1
    namespace: journal-api
    log_group_name: /aws/otel/journal-api/metrics
  awscloudwatchlogs:
    log_group_name: /aws/otel/journal-api/logs
    log_stream_name: "journal-api"
    region: us-east-1
service:
  pipelines:
    traces:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [awsxray]
    metrics:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [awsemf]
    logs:
      receivers: [otlp]
      processors: [resourcedetection, batch]
      exporters: [awscloudwatchlogs]